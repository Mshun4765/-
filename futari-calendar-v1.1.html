<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<title>ふたりのカレンダー</title>
<style>
  :root {
    --bg: #fbf8f5;
    --card: #ffffff;
    --ink: #4a4438;
    --muted: #a89e8e;
    --line: #ede6dc;
    --pink: #f3c6d3;
    --pink-deep: #e89fb3;
    --mint: #bfe3d0;
    --mint-deep: #8fcaa9;
    --lavender: #d6c9ee;
    --lavender-deep: #b9a3e0;
    --butter: #f5e2a3;
    --butter-deep: #e8c860;
    --today-ring: #e89fb3;
  }

  html {
    color-scheme: light only;
    background: #fbf8f5;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    height: 100vh;
    overflow: hidden;
    color-scheme: light only;
  }

  .wrap { max-width: 480px; margin: 0 auto; padding: 0; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; background: var(--bg); position: relative; }

  .bg-motif-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .bg-motif-layer svg {
    opacity: 0.7;
  }

  .top-bar {
    padding: 14px 14px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 0 0 auto;
    position: relative;
    z-index: 1;
  }

  .top-bar .label {
    font-size: 18px;
    font-weight: 700;
    flex: 1;
    text-align: center;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
  }
  .top-bar .label:active { background: var(--pink); }

  .whoami-btn {
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    flex: 0 0 auto;
  }

  .nav-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: #fff;
    font-size: 16px;
    color: var(--ink);
    cursor: pointer;
    flex: 0 0 auto;
  }
  .nav-btn:active { background: var(--pink); }

  .person-tabs {
    display: flex;
    gap: 8px;
    padding: 0 14px 10px;
    flex: 0 0 auto;
    position: relative;
    z-index: 1;
  }
  .person-tab {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.7);
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .person-tab.selected {
    background: var(--pink-deep);
    color: #fff;
    border-color: var(--pink-deep);
  }

  .weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 0 0 6px;
    flex: 0 0 auto;
    position: relative;
    z-index: 1;
  }
  .weekday-row span:first-child { color: var(--pink-deep); }
  .weekday-row span:last-child { color: var(--lavender-deep); }

  .grid-wrap {
    flex: 1 1 auto;
    overflow: hidden;
    border-top: 1px solid var(--line);
    border-left: 1px solid var(--line);
    touch-action: pan-y;
    position: relative;
    z-index: 1;
  }

  .grid-track {
    display: flex;
    width: 300%;
    height: 100%;
    transform: translateX(calc(-100% / 3)); /* 3枚中、中央(今月)を表示位置に */
  }

  .grid-pane {
    width: 33.3333%;
    height: 100%;
    flex: 0 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(6, 1fr);
    height: 100%;
  }

  .day-cell {
    background: rgba(255, 255, 255, 0.72);
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 4px 3px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
    min-width: 0;
    min-height: 0;
    position: relative;
    z-index: 1;
  }
  .day-cell.other-month { background: rgba(246, 241, 234, 0.72); }
  .day-cell.other-month .day-num { color: #c9bfae; }
  .day-cell.other-month.sun .day-num { color: #e8b9c5; }
  .day-cell.other-month.sat .day-num { color: #cabbe6; }
  .day-cell:active { background: #fdf6f8; }

  .day-num {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    width: 19px;
    height: 19px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    flex: 0 0 auto;
  }
  .day-cell.today .day-num {
    background: var(--today-ring);
    color: #fff;
  }
  .day-cell.sun .day-num { color: var(--pink-deep); }
  .day-cell.sat .day-num { color: var(--lavender-deep); }
  .day-cell.today.sun .day-num,
  .day-cell.today.sat .day-num { color: #fff; }

  .event-chip {
    font-size: 10px;
    border-radius: 5px;
    padding: 1px 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #4a4438;
  }

  /* 複数日にまたがる終日予定の「帯」表示。
     マスの左右パディング分だけ外側にめり込ませて、隣のマスのチップと視覚的に繋げる。 */
  .event-chip-span {
    border-radius: 0;
    margin: 0 -3px;
    padding-left: 4px;
    padding-right: 4px;
  }
  .event-chip-span-single {
    border-radius: 5px;
    margin: 0;
  }
  .event-chip-span-start {
    border-radius: 5px 0 0 5px;
    margin-left: 0;
  }
  .event-chip-span-end {
    border-radius: 0 5px 5px 0;
    margin-right: 0;
  }

  .event-more {
    font-size: 9px;
    color: var(--muted);
    padding-left: 4px;
  }

  .event-chip-shared {
    box-shadow: inset 0 0 0 1.5px var(--lavender-deep);
  }
  /* 帯表示の共有予定：つながって見えるよう左右の枠線を位置に応じて消す */
  .event-chip-span.event-chip-shared.event-chip-span-start {
    box-shadow: inset 0 1.5px 0 0 var(--lavender-deep), inset 0 -1.5px 0 0 var(--lavender-deep), inset 1.5px 0 0 0 var(--lavender-deep);
  }
  .event-chip-span.event-chip-shared.event-chip-span-middle {
    box-shadow: inset 0 1.5px 0 0 var(--lavender-deep), inset 0 -1.5px 0 0 var(--lavender-deep);
  }
  .event-chip-span.event-chip-shared.event-chip-span-end {
    box-shadow: inset 0 1.5px 0 0 var(--lavender-deep), inset 0 -1.5px 0 0 var(--lavender-deep), inset -1.5px 0 0 0 var(--lavender-deep);
  }

  .fab {
    position: fixed;
    right: 20px;
    bottom: 28px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--pink-deep);
    color: #fff;
    border: none;
    font-size: 26px;
    box-shadow: 0 6px 16px rgba(232,159,179,0.45);
    cursor: pointer;
    z-index: 10;
  }
  .fab:active { background: var(--pink); }

  .sheet-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(74,68,56,0.35);
    z-index: 30;
    align-items: flex-end;
    justify-content: center;
  }
  .sheet-overlay.open { display: flex; }

  .sheet {
    background: var(--bg);
    width: 100%;
    max-width: 480px;
    border-radius: 22px 22px 0 0;
    padding: 22px 20px 28px;
    max-height: 85vh;
    overflow-y: auto;
  }

  .sheet h2 {
    font-size: 17px;
    margin: 0 0 16px;
  }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 600;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 15px;
    background: #fff;
    color: var(--ink);
    font-family: inherit;
  }
  .field textarea { min-height: 60px; resize: vertical; }

  .time-row { display: flex; gap: 10px; align-items: center; }
  .time-row .field { flex: 1; margin-bottom: 0; }
  .allday-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px; font-size: 13px; color: var(--muted);
  }

  .owner-toggle {
    display: flex;
    gap: 8px;
  }
  .owner-toggle-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .owner-toggle-btn.selected {
    background: var(--lavender);
    color: var(--ink);
    border-color: var(--lavender-deep);
  }

  .color-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .color-swatch {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
  }
  .color-swatch.selected { border-color: var(--ink); }

  .sheet-actions { display: flex; gap: 8px; margin-top: 6px; }
  .sheet-actions button {
    flex: 1;
    padding: 13px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
  }
  .add-btn-like {
    display: block;
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px dashed var(--line);
    background: transparent;
    color: var(--pink-deep);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 14px;
  }
  .add-btn-like:active { background: var(--pink); }
  .btn-save { background: var(--pink-deep); color: #fff; }
  .btn-delete { background: #fff; color: #c0644f; border: 1px solid #e8c9c0; }
  .btn-cancel { background: #fff; color: var(--muted); border: 1px solid var(--line); }

  .day-list { margin-top: 4px; }
  .day-list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
  }
  .day-list-item:last-child { border-bottom: none; }
  .day-list-color {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex: 0 0 auto;
  }
  .day-list-title { font-size: 14px; font-weight: 600; flex: 1; }

  .owner-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 999px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .owner-badge-shared { background: var(--lavender); color: var(--ink); }
  .day-list-time { font-size: 12px; color: var(--muted); }
  .day-list-author { font-size: 11px; color: var(--muted); }

  .day-list-copy-btn {
    border: none;
    background: transparent;
    font-size: 16px;
    padding: 6px;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .day-list-copy-btn:active { opacity: 0.5; }

  .empty-day {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 24px 0;
  }

  .whoami-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(74,68,56,0.35);
    z-index: 40;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .whoami-overlay.open { display: flex; }
  .whoami-box {
    background: var(--card);
    border-radius: 18px;
    padding: 24px;
    max-width: 340px;
    width: 100%;
  }
  .whoami-box h3 { margin: 0 0 6px; font-size: 16px; }
  .whoami-box p { margin: 0 0 16px; font-size: 13px; color: var(--muted); }
  .whoami-box input {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 15px;
    margin-bottom: 14px;
  }
  .whoami-box button:not(.mini-nav-btn) {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--pink-deep);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }

  .copy-box { max-width: 380px; }
  .copy-box p { margin: 0; }

  .mini-cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 4px 0 8px;
  }
  .mini-cal-label { font-size: 14px; font-weight: 700; }
  .mini-nav-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: #fff;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .mini-nav-btn:active { background: var(--pink); }

  .mini-weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .mini-weekday-row span:first-child { color: var(--pink-deep); }
  .mini-weekday-row span:last-child { color: var(--lavender-deep); }

  .mini-cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .mini-day-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--ink);
    background: var(--bg);
    position: relative;
  }
  .mini-day-cell.other-month { color: #c9bfae; }
  .mini-day-cell.today { font-weight: 700; }
  .mini-day-cell.today::after {
    content: '';
    position: absolute;
    bottom: 3px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--today-ring);
  }
  .mini-day-cell.selected {
    background: var(--pink-deep);
    color: #fff;
    font-weight: 700;
  }
  .mini-day-cell.selected.today::after { background: #fff; }
  .mini-day-cell:active { background: var(--pink); }

  .copy-selected-count {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin: 10px 0 0;
    min-height: 16px;
  }

  .dial-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin: 14px 0 4px;
  }
  .dial-col {
    position: relative;
    width: 80px;
    height: 160px;
  }
  .dial-scroll {
    height: 160px;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .dial-scroll::-webkit-scrollbar { display: none; }
  .dial-scroll-pad {
    height: 64px; /* (160 - 行高32) / 2 で中央に最初/最後の値が来るようにする */
    flex: 0 0 auto;
  }
  .dial-item {
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    color: var(--muted);
    scroll-snap-align: center;
    font-weight: 600;
  }
  .dial-item.dial-current {
    color: var(--ink);
    font-size: 20px;
    font-weight: 700;
  }
  .dial-fade-top, .dial-fade-bottom {
    position: absolute;
    left: 0; right: 0;
    height: 56px;
    pointer-events: none;
    z-index: 2;
  }
  .dial-fade-top {
    top: 0;
    background: linear-gradient(to bottom, var(--card), rgba(255,255,255,0));
  }
  .dial-fade-bottom {
    bottom: 0;
    background: linear-gradient(to top, var(--card), rgba(255,255,255,0));
  }
  .dial-center-line {
    position: absolute;
    left: 4px; right: 4px;
    top: 64px;
    height: 32px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    pointer-events: none;
    z-index: 1;
  }
  .dial-unit { font-size: 14px; color: var(--muted); }

  .sync-status {
    position: fixed;
    left: 0; right: 0; bottom: 8px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    min-height: 14px;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="bg-motif-layer" id="bgMotifLayer"></div>

  <div class="top-bar">
    <button class="nav-btn" id="prevMonthBtn">‹</button>
    <span class="label" id="monthLabel"></span>
    <button class="nav-btn" id="nextMonthBtn">›</button>
    <button class="nav-btn" id="refreshBtn" title="最新の状態に更新">⟳</button>
    <button class="whoami-btn" id="whoamiBtn">名前</button>
  </div>

  <div class="person-tabs">
    <button class="person-tab selected" id="personTabMine" data-who="mine">自分</button>
    <button class="person-tab" id="personTabPartner" data-who="partner">パートナー</button>
  </div>

  <div class="weekday-row">
    <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
  </div>

  <div class="grid-wrap" id="gridWrap">
    <div class="grid-track" id="calendarTrack"></div>
  </div>

  <p class="sync-status" id="syncStatus"></p>
</div>

<button class="fab" id="addFab">＋</button>

<!-- 日付タップ時：その日の予定一覧 -->
<div class="sheet-overlay" id="dayListOverlay">
  <div class="sheet">
    <h2 id="dayListTitle"></h2>
    <div class="day-list" id="dayListBody"></div>
    <div class="sheet-actions" style="margin-top:18px;">
      <button class="btn-cancel" id="dayListCloseBtn">閉じる</button>
      <button class="btn-save" id="dayListAddBtn">この日に追加</button>
    </div>
  </div>
</div>

<!-- 予定の追加・編集 -->
<div class="sheet-overlay" id="eventSheetOverlay">
  <div class="sheet">
    <h2 id="eventSheetTitle">予定を追加</h2>

    <div class="field">
      <label>タイトル</label>
      <input type="text" id="eventTitle" placeholder="予定の名前">
    </div>

    <div class="field" id="ownerToggleField">
      <label>予定の種類</label>
      <div class="owner-toggle">
        <button type="button" class="owner-toggle-btn selected" id="ownerMineBtn" data-owner="mine">自分だけ</button>
        <button type="button" class="owner-toggle-btn" id="ownerSharedBtn" data-owner="shared">ふたり共有</button>
      </div>
    </div>

    <div class="field">
      <label>日付</label>
      <input type="date" id="eventDate">
    </div>

    <div class="allday-row">
      <input type="checkbox" id="eventAllDay">
      <label for="eventAllDay" style="margin:0;">終日</label>
    </div>

    <div class="field" id="multiDayField" style="display:none;">
      <label>最終日（複数日にまたがる場合のみ）</label>
      <input type="date" id="eventEndDate">
    </div>

    <div class="time-row" id="timeRow">
      <div class="field">
        <label>開始</label>
        <input type="time" id="eventStart">
      </div>
      <div class="field">
        <label>終了</label>
        <input type="time" id="eventEnd">
      </div>
    </div>

    <div class="field">
      <label>繰り返し</label>
      <select id="eventRepeat">
        <option value="">なし</option>
        <option value="weekly">毎週この曜日</option>
        <option value="monthly">毎月この日</option>
      </select>
    </div>

    <div class="field" id="repeatUntilField" style="display:none;">
      <label>繰り返しの終了日</label>
      <input type="date" id="eventRepeatUntil">
    </div>

    <div class="field">
      <label>メモ</label>
      <textarea id="eventMemo" placeholder="場所やメモ（任意）"></textarea>
    </div>

    <div class="field">
      <label>色</label>
      <div class="color-row" id="colorRow"></div>
    </div>

    <div class="field" id="editScopeField" style="display:none;">
      <label>この変更を適用する範囲</label>
      <select id="editScope">
        <option value="this">この回だけ</option>
        <option value="all">この予定すべて（繰り返し全体）</option>
      </select>
    </div>

    <button class="add-btn-like" id="copyFromEditBtn" style="display:none;">📋 この予定を別の日にコピー</button>

    <div class="sheet-actions">
      <button class="btn-cancel" id="eventCancelBtn">キャンセル</button>
      <button class="btn-delete" id="eventDeleteBtn" style="display:none;">削除</button>
      <button class="btn-save" id="eventSaveBtn">保存</button>
    </div>
  </div>
</div>

<!-- 初回の名前入力 -->
<div class="whoami-overlay" id="whoamiOverlay">
  <div class="whoami-box">
    <h3>ふたりのカレンダーをはじめましょう</h3>
    <p id="whoamiDesc">新しく共有スペースを作るか、パートナーからもらったコードで参加するかを選んでください。</p>

    <div class="owner-toggle" style="margin-bottom:14px;">

<script>
// ===== JSONBin.io 設定 =====
const JSONBIN_API_KEY = '$2a$10$gLs4dL8IBBntsIuU4OI2n.WoFpESXcnEl5uJJ2i5z8MFefQjvodBy';
const JSONBIN_BASE = 'https://api.jsonbin.io/v3/b';
const STORAGE_PAIRINFO_KEY = 'futari-calendar:pairinfo:v2'; // 個人デバイスに保存: 共有コード(binId)・自分の名前・パートナー名

// 新しい共有スペース(Bin)を作成し、Bin IDを返す
async function jsonbinCreate(initialData) {
  let res;
  try {
    res = await fetch(JSONBIN_BASE, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_API_KEY,
        'X-Bin-Private': 'true'
      },
      body: JSON.stringify(initialData)
    });
  } catch (networkErr) {
    throw new Error('通信エラー: ' + networkErr.message);
  }
  if (!res.ok) {
    let detail = '';
    try { const errBody = await res.json(); detail = errBody.message || JSON.stringify(errBody); } catch (e) {}
    throw new Error(`Bin作成に失敗しました (HTTP ${res.status}) ${detail}`);
  }
  const data = await res.json();
  return data.metadata.id;
}

// 指定したBin IDの中身を取得
async function jsonbinRead(binId) {
  const res = await fetch(`${JSONBIN_BASE}/${binId}/latest`, {
    headers: { 'X-Master-Key': JSONBIN_API_KEY }
  });
  if (!res.ok) throw new Error('共有スペースが見つかりませんでした');
  const data = await res.json();
  return data.record;
}

// 指定したBin IDの中身を丸ごと上書き保存
async function jsonbinUpdate(binId, fullData) {
  const res = await fetch(`${JSONBIN_BASE}/${binId}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': JSONBIN_API_KEY
    },
    body: JSON.stringify(fullData)
  });
  if (!res.ok) throw new Error('保存に失敗しました');
  return true;
}


// ===== 月ごとの背景イラスト =====
// 月ごとの背景パターン（SVGのpatternタイルとして敷き詰める）
const BG_PATTERNS = {
  // 冬：雪の結晶・粉雪
  snow: `

function patternForMonth(month0) {
  // month0: 0-11 (0=1月)
  const month1 = month0 + 1;
  if (month1 === 12 || month1 === 1 || month1 === 2) return 'snow'; // 冬
  if (month1 >= 6 && month1 <= 8) return 'summer'; // 夏
  return 'leaf'; // 春・秋
}

function renderBgMotifs(year, month0) {

const COLORS = [
  { id: 'pink', bg: '#f3c6d3', label: 'ピンク' },
  { id: 'mint', bg: '#bfe3d0', label: 'ミント' },
  { id: 'sky', bg: '#bcdcf2', label: 'サックスブルー' },

  { id: 'butter', bg: '#f5e2a3', label: 'バター' },
];

let events = []; // {id, date:'YYYY-MM-DD', title, allDay, start, end, memo, color, author}
let myName = '';
let partnerName = '';
let pairCode = '';
let viewingWhose = 'mine'; // 'mine' or 'partner'：今どちらの予定を表示しているか
let viewYear, viewMonth; // viewMonth: 0-11
let selectedDateStr = null;
let editingEventId = null;

function pad2(n) { return String(n).padStart(2, '0'); }
function dateStr(y, m, d) { return `${y}-${pad2(m + 1)}-${pad2(d)}`; }
function todayStr() {
  const t = new Date();
  return dateStr(t.getFullYear(), t.getMonth(), t.getDate());
}
function uid() { return 'e' + Date.now() + Math.random().toString(36).slice(2, 7); }

function colorBg(colorId) {
  const c = COLORS.find(c => c.id === colorId);
  return c ? c.bg : '#e0e0e0';
}

// 指定した月（year, month0-11）に表示すべき予定インスタンスの一覧を返す。
// 繰り返しの無い予定はそのまま、繰り返しのある予定は対象月の中で該当する日付分だけ展開する。
function expandEventsForMonth(sourceEvents, year, month) {
  const monthStart = new Date(year, month, 1);
  const monthEnd = new Date(year, month + 1, 0);
  const instances = [];

  sourceEvents.forEach(ev => {
    const baseDate = parseDate(ev.date);
    if (!ev.repeat) {
      if (ev.endDate && ev.endDate > ev.date) {
        // 複数日にまたがる終日予定: 開始日〜終了日の範囲を、この月の中だけ展開する
        const spanEnd = parseDate(ev.endDate);
        const rangeStart = new Date(Math.max(baseDate, monthStart));
        const rangeEnd = new Date(Math.min(spanEnd, monthEnd));
        for (let cur = new Date(rangeStart); cur <= rangeEnd; cur.setDate(cur.getDate() + 1)) {
          const ids = dateStr(cur.getFullYear(), cur.getMonth(), cur.getDate());
          let spanPosition = 'middle';
          if (ids === ev.date) spanPosition = 'start';
          if (ids === ev.endDate) spanPosition = 'end';
          if (ev.date === ev.endDate) spanPosition = 'single';
          instances.push({ ...ev, instanceDate: ids, spanPosition });
        }
        return;
      }
      if (ev.date >= dateStr(year, month, 1) && ev.date <= dateStr(year, month, monthEnd.getDate())) {
        instances.push({ ...ev, instanceDate: ev.date, spanPosition: 'single' });
      }
      return;
    }

    const until = ev.repeatUntil ? parseDate(ev.repeatUntil) : null;
    const excluded = new Set(ev.excludedDates || []);

    if (ev.repeat === 'weekly') {
      const weekday = baseDate.getDay();
      // 対象月内で、baseDateの曜日と同じ日を全て探す
      for (let d = 1; d <= monthEnd.getDate(); d++) {
        const cur = new Date(year, month, d);
        if (cur.getDay() !== weekday) continue;
        if (cur < baseDate) continue;
        if (until && cur > until) continue;
        const ids = dateStr(year, month, d);
        if (excluded.has(ids)) continue;
        instances.push({ ...ev, instanceDate: ids, spanPosition: 'single' });
      }
    } else if (ev.repeat === 'monthly') {
      const dom = baseDate.getDate();
      const lastDay = monthEnd.getDate();
      const targetDay = Math.min(dom, lastDay); // 31日始まりの予定が30日の月に来た場合は末日に合わせる
      const cur = new Date(year, month, targetDay);
      if (cur < baseDate) return;
      if (until && cur > until) return;
      const ids = dateStr(year, month, targetDay);
      if (excluded.has(ids)) return;
      instances.push({ ...ev, instanceDate: ids, spanPosition: 'single' });
    }
  });

  return instances;
}

// 現在表示中のタブ（自分／パートナー）に応じて、見るべき予定一覧を返す。
// 「自分」タブ: 自分の予定 + 共有の予定（どちらも編集可）
// 「パートナー」タブ: パートナーの予定（閲覧専用） + 共有の予定（編集可）
function currentPersonalEvents() {
  return viewingWhose === 'mine' ? events : partnerEvents;
}

function getEventInstancesForMonth(year, month) {
  const personal = expandEventsForMonth(currentPersonalEvents(), year, month)
    .map(ev => ({ ...ev, owner: viewingWhose === 'mine' ? 'mine' : 'partner' }));
  const shared = expandEventsForMonth(sharedEvents, year, month)
    .map(ev => ({ ...ev, owner: 'shared' }));
  const instances = [...personal, ...shared];

  return instances;
}

function parseDate(ds) {
  const [y, m, d] = ds.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatMonthDay(ds) {
  const d = parseDate(ds);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function repeatLabel(ev) {
  if (!ev.repeat) return '';
  if (ev.repeat === 'weekly') {
    const wd = ['日','月','火','水','木','金','土'][parseDate(ev.date).getDay()];
    return `毎週${wd}曜`;
  }
  if (ev.repeat === 'monthly') {
    return `毎月${parseDate(ev.date).getDate()}日`;
  }
  return '';
}

// ===== 永続化 =====
// events: 自分の予定。partnerEvents: パートナーの予定(閲覧専用)。sharedEvents: ふたり共有の予定(両方編集可)。
// pairCode変数はそのまま「共有スペースのBin ID」として使う(変数名は元のコードと互換のため変更しない)
let partnerEvents = [];
let sharedEvents = [];

// Bin全体のデータ構造: { members: { "名前": [...events] }, shared: [...events] }
async function loadAllEventLists() {
  try {
    const record = await jsonbinRead(pairCode);
    const members = record.members || {};
    events = members[myName] || [];
    partnerEvents = members[partnerName] || [];
    sharedEvents = record.shared || [];
  } catch (e) {
    events = []; partnerEvents = []; sharedEvents = [];
  }
}

// 保存前に最新のBinデータを取得し、自分の担当部分だけ更新してから丸ごと書き戻す
// （他の端末が別の部分を更新している可能性があるため、丸ごと上書きではなく部分更新にする）
async function saveMyEvents() {
  const statusEl = document.getElementById('syncStatus');
  try {
    const record = await jsonbinRead(pairCode);
    const members = record.members || {};
    members[myName] = events;
    await jsonbinUpdate(pairCode, { members, shared: record.shared || [] });

    setTimeout(() => { statusEl.textContent = ''; }, 2000);
  } catch (e) {
    statusEl.textContent = '保存エラー。もう一度お試しください';
  }
}

async function saveSharedEvents() {
  const statusEl = document.getElementById('syncStatus');
  try {
    const record = await jsonbinRead(pairCode);
    const members = record.members || {};
    await jsonbinUpdate(pairCode, { members, shared: sharedEvents });
    statusEl.textContent = '保存しました（共有の予定としてふたりに反映されます）';
    setTimeout(() => { statusEl.textContent = ''; }, 2000);
  } catch (e) {
    statusEl.textContent = '保存エラー。もう一度お試しください';

// ===== カレンダー描画 =====
// 指定した年月の42マス分のグリッド要素(DOM)を1つ作って返す
function buildMonthGridElement(year, month) {
  const grid = document.createElement('div');
  grid.className = 'grid';

  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay(); // 0=日
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const today = todayStr();

  const prevYM = month === 0 ? [year - 1, 11] : [year, month - 1];
  const nextYM = month === 11 ? [year + 1, 0] : [year, month + 1];
  const allInstances = [
    ...getEventInstancesForMonth(prevYM[0], prevYM[1]),
    ...getEventInstancesForMonth(year, month),
    ...getEventInstancesForMonth(nextYM[0], nextYM[1]),
  ];

  const cells = [];
  for (let i = 0; i < startWeekday; i++) {
    const d = daysInPrevMonth - startWeekday + 1 + i;
    let y = year, m = month - 1;
    if (m < 0) { m = 11; y -= 1; }
    cells.push({ y, m, d, otherMonth: true });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ y: year, m: month, d, otherMonth: false });
  }
  while (cells.length % 7 !== 0 || cells.length < 35) {
    const last = cells[cells.length - 1];
    let y = last.y, m = last.m, d = last.d + 1;
    const dim = new Date(y, m + 1, 0).getDate();
    if (d > dim) { d = 1; m += 1; if (m > 11) { m = 0; y += 1; } }
    cells.push({ y, m, d, otherMonth: true });
    if (cells.length >= 42) break;
  }

  cells.forEach((cell, idx) => {
    const ds = dateStr(cell.y, cell.m, cell.d);
    const weekday = idx % 7;
    const cellEl = document.createElement('div');
    cellEl.className = 'day-cell' + (cell.otherMonth ? ' other-month' : '') + (ds === today ? ' today' : '') + (weekday === 0 ? ' sun' : '') + (weekday === 6 ? ' sat' : '');
    cellEl.dataset.date = ds;

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = cell.d;
    cellEl.appendChild(numEl);

    const dayEvents = allInstances.filter(e => e.instanceDate === ds).sort((a, b) => {
      const aSpan = a.spanPosition && a.spanPosition !== 'single';
      const bSpan = b.spanPosition && b.spanPosition !== 'single';
      if (aSpan && !bSpan) return -1;
      if (!aSpan && bSpan) return 1;
      if (a.allDay && !b.allDay) return -1;
      if (!a.allDay && b.allDay) return 1;
      return (a.start || '').localeCompare(b.start || '');
    });

    const maxShow = 2;
    dayEvents.slice(0, maxShow).forEach(ev => {
      const chip = document.createElement('div');
      const isSpan = ev.spanPosition && ev.spanPosition !== 'single';
      chip.className = 'event-chip' + (isSpan ? ' event-chip-span event-chip-span-' + ev.spanPosition : '') + (ev.owner === 'shared' ? ' event-chip-shared' : '');
      chip.style.background = colorBg(ev.color);
      // 帯表示の中日・最終日はタイトルを表示しない（初日にだけ表示して、繋がった帯に見せる）
      chip.textContent = (isSpan && ev.spanPosition !== 'start') ? '\u00A0' : (ev.title || '(無題)');
      cellEl.appendChild(chip);
    });
    if (dayEvents.length > maxShow) {
      const more = document.createElement('div');
      more.className = 'event-more';
      more.textContent = `+${dayEvents.length - maxShow}`;
      cellEl.appendChild(more);
    }

    cellEl.addEventListener('click', () => openDayList(ds));
    grid.appendChild(cellEl);
  });

  return grid;
}

// 現在月の前後を含めた3枚のグリッドを並べてトラックに配置する
function renderCalendar() {
  document.getElementById('monthLabel').textContent = `${viewYear}年 ${viewMonth + 1}月`;

  const track = document.getElementById('calendarTrack');
  track.innerHTML = '';
  track.style.transition = 'none';
  track.style.transform = 'translateX(calc(-100% / 3))';

  const prevYM = viewMonth === 0 ? [viewYear - 1, 11] : [viewYear, viewMonth - 1];
  const nextYM = viewMonth === 11 ? [viewYear + 1, 0] : [viewYear, viewMonth + 1];

  const prevPane = document.createElement('div');
  prevPane.className = 'grid-pane';
  prevPane.appendChild(buildMonthGridElement(prevYM[0], prevYM[1]));

  const curPane = document.createElement('div');
  curPane.className = 'grid-pane';
  curPane.appendChild(buildMonthGridElement(viewYear, viewMonth));

  const nextPane = document.createElement('div');
  nextPane.className = 'grid-pane';
  nextPane.appendChild(buildMonthGridElement(nextYM[0], nextYM[1]));

  track.appendChild(prevPane);
  track.appendChild(curPane);
  track.appendChild(nextPane);

  renderBgMotifs(viewYear, viewMonth);
}

// ===== 日付タップ時の一覧 =====
function openDayList(ds) {
  selectedDateStr = ds;
  const [y, m, d] = ds.split('-').map(Number);
  document.getElementById('dayListTitle').textContent = `${y}年${m}月${d}日`;

  const body = document.getElementById('dayListBody');
  body.innerHTML = '';
  const targetMonth0 = m - 1;
  const prevYM = targetMonth0 === 0 ? [y - 1, 11] : [y, targetMonth0 - 1];
  const nextYM = targetMonth0 === 11 ? [y + 1, 0] : [y, targetMonth0 + 1];
  const allInstances = [
    ...getEventInstancesForMonth(prevYM[0], prevYM[1]),
    ...getEventInstancesForMonth(y, targetMonth0),
    ...getEventInstancesForMonth(nextYM[0], nextYM[1]),
  ];
  const dayEvents = allInstances.filter(e => e.instanceDate === ds).sort((a, b) => {
    if (a.allDay && !b.allDay) return -1;
    if (!a.allDay && b.allDay) return 1;
    return (a.start || '').localeCompare(b.start || '');
  });

  if (dayEvents.length === 0) {
    body.innerHTML = '<p class="empty-day">予定はまだありません</p>';
  } else {
    dayEvents.forEach(ev => {
      const item = document.createElement('div');
      item.className = 'day-list-item';
      let timeLabel;
      if (ev.allDay && ev.endDate && ev.endDate !== ev.date) {
        timeLabel = `終日 ・ ${formatMonthDay(ev.date)}〜${formatMonthDay(ev.endDate)}`;
      } else {
        timeLabel = ev.allDay ? '終日' : (ev.start || '') + (ev.end ? ('〜' + ev.end) : '');
      }
      const repeatTag = ev.repeat ? ` ・ 🔁${repeatLabel(ev)}` : '';
      const ownerBadge = ev.owner === 'shared' ? '<span class="owner-badge owner-badge-shared">共有</span>' : '';
      item.innerHTML = `
        <div class="day-list-color" style="background:${colorBg(ev.color)}"></div>
        <div style="flex:1;">
          <div class="day-list-title">${escapeHtml(ev.title || '(無題)')}${ownerBadge}</div>
          <div class="day-list-time">${timeLabel}${ev.author ? ' ・ ' + escapeHtml(ev.author) : ''}${repeatTag}</div>
        </div>
      `;
      item.addEventListener('click', () => openEventSheet(ev.id, ev.instanceDate));
      body.appendChild(item);
    });
  }

  document.getElementById('dayListOverlay').classList.add('open');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderColorRow(selectedColor) {
  const row = document.getElementById('colorRow');
  row.innerHTML = '';
  COLORS.forEach(c => {

    sw.className = 'color-swatch' + (c.id === selectedColor ? ' selected' : '');

      document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('selected'));
      sw.classList.add('selected');

let editingInstanceDate = null; // 「この回だけ編集」のために、タップしたインスタンスの実日付を保持

let editingOwner = 'mine'; // 'mine' or 'shared'：今開いている予定がどちらのリストのものか

function findEventByIdAndOwner(eventId) {
  if (!eventId) return { ev: null, owner: 'mine' };
  const inMine = events.find(e => e.id === eventId);
  if (inMine) return { ev: inMine, owner: 'mine' };
  const inPartner = partnerEvents.find(e => e.id === eventId);
  if (inPartner) return { ev: inPartner, owner: 'partner' };
  const inShared = sharedEvents.find(e => e.id === eventId);
  if (inShared) return { ev: inShared, owner: 'shared' };
  return { ev: null, owner: 'mine' };
}

function setOwnerToggle(owner, options) {
  const opts = options || {};
  editingOwner = owner;
  document.getElementById('ownerMineBtn').classList.toggle('selected', owner === 'mine');
  document.getElementById('ownerSharedBtn').classList.toggle('selected', owner === 'shared');
  const toggleField = document.getElementById('ownerToggleField');
  toggleField.style.display = opts.hideToggle ? 'none' : 'block';
  document.getElementById('ownerMineBtn').disabled = !!opts.disableMine;
}

function openEventSheet(eventId, instanceDate) {
  editingEventId = eventId || null;
  editingInstanceDate = instanceDate || null;
  const found = findEventByIdAndOwner(eventId);
  const ev = found.ev;

  document.getElementById('eventSheetTitle').textContent = ev ? '予定を編集' : '予定を追加';
  document.getElementById('eventTitle').value = ev ? ev.title : '';
  // 編集時は「実際にタップした回の日付」を表示する（繰り返し予定の基準日ではなく）
  document.getElementById('eventDate').value = ev ? (instanceDate || ev.date) : (selectedDateStr || todayStr());
  document.getElementById('eventAllDay').checked = ev ? !!ev.allDay : false;
  document.getElementById('eventEndDate').value = ev ? (ev.endDate || '') : '';
  document.getElementById('eventStart').value = ev ? (ev.start || '') : '09:00';
  document.getElementById('eventEnd').value = ev ? (ev.end || '') : '10:00';
  document.getElementById('eventMemo').value = ev ? (ev.memo || '') : '';
  document.getElementById('eventRepeat').value = ev ? (ev.repeat || '') : '';
  document.getElementById('eventRepeatUntil').value = ev ? (ev.repeatUntil || '') : '';
  document.getElementById('eventDeleteBtn').style.display = ev ? 'block' : 'none';

  // 予定の種類（自分／共有）の扱いを決める
  if (found.owner === 'partner') {

    setOwnerToggle('shared', { hideToggle: true });

  } else if (ev) {
    setOwnerToggle(found.owner, { hideToggle: true });
  } else if (viewingWhose === 'partner') {

    setOwnerToggle('shared', { hideToggle: true });

  renderColorRow(ev ? ev.color : COLORS[0].id);

  document.getElementById('copyFromEditBtn').style.display = (ev && found.owner !== 'partner') ? 'block' : 'none';

  document.getElementById('eventSaveBtn').style.display = (found.owner === 'partner') ? 'none' : 'block';

function toggleTimeRow() {

async function saveEvent() {
  const title = document.getElementById('eventTitle').value.trim();
  if (!title) {
    document.getElementById('eventTitle').focus();
    return;
  }
  const date = document.getElementById('eventDate').value;
  const allDay = document.getElementById('eventAllDay').checked;
  const start = document.getElementById('eventStart').value;
  const end = document.getElementById('eventEnd').value;
  let endDate = allDay ? (document.getElementById('eventEndDate').value || null) : null;
  if (endDate && endDate < date) endDate = null; // 最終日が開始日より前なら単日扱いにする
  const memo = document.getElementById('eventMemo').value.trim();
  const repeat = document.getElementById('eventRepeat').value || null;
  const repeatUntil = repeat ? (document.getElementById('eventRepeatUntil').value || null) : null;
  const selectedSwatch = document.querySelector('.color-swatch.selected');
  const color = selectedSwatch ? selectedSwatch.dataset.colorId : COLORS[0].id;
  const scope = document.getElementById('editScope').value; // 'this' or 'all'

  // 保存先（自分の予定リスト か 共有の予定リスト か）を決める
  const targetList = editingOwner === 'shared' ? sharedEvents : events;
  const targetSave = editingOwner === 'shared' ? saveSharedEvents : saveMyEvents;
  const authorLabel = editingOwner === 'shared' ? (myName || '?') : (myName || '?');

  if (editingEventId) {
    const ev = targetList.find(e => e.id === editingEventId);
    if (ev) {
      const wasRepeating = !!ev.repeat;

      if (wasRepeating && scope === 'this') {
        // 「この回だけ」編集: 元の繰り返し予定にはこの日を除外日として記録し、
        // 編集後の内容で単発の予定を新しく作る
        ev.excludedDates = ev.excludedDates || [];
        if (editingInstanceDate && !ev.excludedDates.includes(editingInstanceDate)) {
          ev.excludedDates.push(editingInstanceDate);
        }
        targetList.push({
          id: uid(), title, date, allDay, endDate,
          start: allDay ? '' : start, end: allDay ? '' : end,
          memo, color, repeat: null, repeatUntil: null,
          author: ev.author || authorLabel
        });
      } else {
        // 「この予定すべて」、またはそもそも繰り返しではない予定の編集
        ev.title = title; ev.date = date; ev.allDay = allDay; ev.endDate = endDate;
        ev.start = allDay ? '' : start; ev.end = allDay ? '' : end;
        ev.memo = memo; ev.color = color;
        ev.repeat = repeat; ev.repeatUntil = repeatUntil;
      }
    }
  } else {
    targetList.push({
      id: uid(), title, date, allDay, endDate,
      start: allDay ? '' : start, end: allDay ? '' : end,
      memo, color, repeat, repeatUntil, excludedDates: [],
      author: authorLabel
    });
  }

  await targetSave();
  closeEventSheet();
  renderCalendar();
  selectedDateStr = date;
  openDayList(selectedDateStr);
}

async function deleteEvent() {
  if (!editingEventId) return;
  const targetList = editingOwner === 'shared' ? sharedEvents : events;
  const ev = targetList.find(e => e.id === editingEventId);
  const scope = document.getElementById('editScope').value;

  if (ev && ev.repeat && scope === 'this' && editingInstanceDate) {
    // この回だけ削除: 除外日に追加するだけで、繰り返し予定そのものは残す
    ev.excludedDates = ev.excludedDates || [];
    if (!ev.excludedDates.includes(editingInstanceDate)) {
      ev.excludedDates.push(editingInstanceDate);
    }
  } else if (editingOwner === 'shared') {
    sharedEvents = sharedEvents.filter(e => e.id !== editingEventId);
  } else {
    events = events.filter(e => e.id !== editingEventId);
  }

  if (editingOwner === 'shared') {
    await saveSharedEvents();
  } else {
    await saveMyEvents();
  }
  closeEventSheet();
  renderCalendar();
  if (selectedDateStr) openDayList(selectedDateStr);
}

// ===== コピー機能（複数日選択） =====
let copySourceEventId = null;
let copySourceInstanceDate = null;
let copySourceOwner = 'mine'; // コピー元の予定が自分のものか共有のものか
let copySelectedDates = []; // 選択中の日付文字列(YYYY-MM-DD)の配列
let copyMiniYear, copyMiniMonth; // ミニカレンダーの表示中の年月(0-11)

function startCopyEvent(eventId, instanceDate) {
  const targetList = editingOwner === 'shared' ? sharedEvents : events;
  const ev = targetList.find(e => e.id === eventId);
  if (!ev) return;
  copySourceEventId = eventId;
  copySourceInstanceDate = instanceDate;
  copySourceOwner = editingOwner;
  copySelectedDates = [];

  const isSpanEvent = ev.allDay && ev.endDate && ev.endDate > ev.date;
  if (isSpanEvent) {
    const msPerDay = 24 * 60 * 60 * 1000;
    const spanDays = Math.round((parseDate(ev.endDate) - parseDate(ev.date)) / msPerDay) + 1;
    document.getElementById('copySourceLabel').textContent = `「${ev.title || '(無題)'}」（${spanDays}日間の予定）をコピーします。選んだ日のうち一番早い日が開始日になり、同じ${spanDays}日間で予定が作られます`;
  } else {
    document.getElementById('copySourceLabel').textContent = `「${ev.title || '(無題)'}」をコピーします`;
  }

  // ミニカレンダーは、コピー元の日付がある月から開始する
  const base = parseDate(instanceDate || ev.date);
  copyMiniYear = base.getFullYear();
  copyMiniMonth = base.getMonth();

  renderCopyMiniCalendar();
  updateCopySelectedCount();
  document.getElementById('copyOverlay').classList.add('open');
}

function closeCopyOverlay() {
  document.getElementById('copyOverlay').classList.remove('open');
  copySourceEventId = null;
  copySourceInstanceDate = null;
  copySelectedDates = [];
}

function changeCopyMiniMonth(delta) {
  copyMiniMonth += delta;
  if (copyMiniMonth < 0) { copyMiniMonth = 11; copyMiniYear -= 1; }
  if (copyMiniMonth > 11) { copyMiniMonth = 0; copyMiniYear += 1; }
  renderCopyMiniCalendar();
}

function renderCopyMiniCalendar() {
  document.getElementById('copyMiniLabel').textContent = `${copyMiniYear}年 ${copyMiniMonth + 1}月`;
  const grid = document.getElementById('copyMiniGrid');
  grid.innerHTML = '';

  const firstDay = new Date(copyMiniYear, copyMiniMonth, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(copyMiniYear, copyMiniMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(copyMiniYear, copyMiniMonth, 0).getDate();
  const today = todayStr();

  const cells = [];
  for (let i = 0; i < startWeekday; i++) {
    const d = daysInPrevMonth - startWeekday + 1 + i;
    let y = copyMiniYear, m = copyMiniMonth - 1;
    if (m < 0) { m = 11; y -= 1; }
    cells.push({ y, m, d, otherMonth: true });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ y: copyMiniYear, m: copyMiniMonth, d, otherMonth: false });
  }
  while (cells.length % 7 !== 0) {
    const last = cells[cells.length - 1];
    let y = last.y, m = last.m, d = last.d + 1;
    const dim = new Date(y, m + 1, 0).getDate();
    if (d > dim) { d = 1; m += 1; if (m > 11) { m = 0; y += 1; } }
    cells.push({ y, m, d, otherMonth: true });
  }

  cells.forEach(cell => {
    const ds = dateStr(cell.y, cell.m, cell.d);
    const cellEl = document.createElement('div');
    cellEl.className = 'mini-day-cell'
      + (cell.otherMonth ? ' other-month' : '')
      + (ds === today ? ' today' : '')
      + (copySelectedDates.includes(ds) ? ' selected' : '');
    cellEl.textContent = cell.d;
    cellEl.dataset.date = ds;
    cellEl.addEventListener('click', () => toggleCopyDate(ds));
    grid.appendChild(cellEl);
  });
}

function toggleCopyDate(ds) {
  const idx = copySelectedDates.indexOf(ds);
  if (idx === -1) {
    copySelectedDates.push(ds);
  } else {
    copySelectedDates.splice(idx, 1);
  }
  renderCopyMiniCalendar();
  updateCopySelectedCount();
}

function updateCopySelectedCount() {
  const el = document.getElementById('copySelectedCount');
  el.textContent = copySelectedDates.length > 0 ? `${copySelectedDates.length}件 選択中` : '';
}

async function confirmCopyEvent() {
  const sourceList = copySourceOwner === 'shared' ? sharedEvents : events;
  const ev = sourceList.find(e => e.id === copySourceEventId);
  if (!ev || copySelectedDates.length === 0) return;

  const targetList = copySourceOwner === 'shared' ? sharedEvents : events;

  // 元の予定が複数日にまたがる帯予定かどうかを判定し、日数(何日間か)を計算しておく
  const isSpanEvent = ev.allDay && ev.endDate && ev.endDate > ev.date;
  let spanDays = 1;
  if (isSpanEvent) {
    const msPerDay = 24 * 60 * 60 * 1000;
    spanDays = Math.round((parseDate(ev.endDate) - parseDate(ev.date)) / msPerDay) + 1;
  }

  if (isSpanEvent) {
    // 帯予定: 選んだ日のうち一番早い日を新しい開始日にして、同じ日数分を1つの予定として伸ばす
    const sortedDates = [...copySelectedDates].sort();
    const newStartDate = sortedDates[0];
    const newStart = parseDate(newStartDate);
    const newEnd = new Date(newStart);
    newEnd.setDate(newEnd.getDate() + spanDays - 1);
    const newEndDateStr = dateStr(newEnd.getFullYear(), newEnd.getMonth(), newEnd.getDate());

    targetList.push({
      id: uid(),
      title: ev.title,
      date: newStartDate,
      endDate: newEndDateStr,
      allDay: true,
      start: '',
      end: '',
      memo: ev.memo || '',
      color: ev.color,
      repeat: null,
      repeatUntil: null,
      excludedDates: [],
      author: myName || '?'
    });

    if (copySourceOwner === 'shared') {
      await saveSharedEvents();
    } else {
      await saveMyEvents();
    }
    closeCopyOverlay();
    closeEventSheet();
    renderCalendar();
    selectedDateStr = newStartDate;
    openDayList(selectedDateStr);
    return;
  }

  // 通常の単発予定: 選んだ日すべてに、それぞれ単発の予定としてコピーを作る（繰り返し設定はコピーしない）
  copySelectedDates.forEach(targetDate => {
    targetList.push({
      id: uid(),
      title: ev.title,
      date: targetDate,
      allDay: ev.allDay,
      start: ev.start || '',
      end: ev.end || '',
      memo: ev.memo || '',
      color: ev.color,
      repeat: null,
      repeatUntil: null,
      excludedDates: [],
      author: myName || '?'
    });
  });

  const lastDate = copySelectedDates[copySelectedDates.length - 1];
  if (copySourceOwner === 'shared') {
    await saveSharedEvents();
  } else {
    await saveMyEvents();
  }
  closeCopyOverlay();
  closeEventSheet();
  renderCalendar();
  selectedDateStr = lastDate;
  openDayList(lastDate);
}

async function saveWhoami() {
  const name = document.getElementById('whoamiInput').value.trim();
  const partner = document.getElementById('partnerNameInput').value.trim();
  const shareCode = document.getElementById('shareCodeInput').value.trim();
  const errorEl = document.getElementById('whoamiError');
  errorEl.textContent = '';

  if (!name) { document.getElementById('whoamiInput').focus(); return; }
  if (!partner) { document.getElementById('partnerNameInput').focus(); return; }
  if (name === partner) {
    errorEl.textContent = '自分とパートナーの名前は別にしてください';
    return;
  }
  if (whoamiMode === 'join' && !shareCode) {
    errorEl.textContent = '共有コードを入力してください';
    document.getElementById('shareCodeInput').focus();
    return;
  }

  const saveBtn = document.getElementById('whoamiSaveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = '準備中…';

  try {
    if (whoamiMode === 'create') {
      // 新しい共有スペースを作成
      const newBinId = await jsonbinCreate({ members: {}, shared: [] });
      pairCode = newBinId;
      myName = name;
      partnerName = partner;
    } else {
      // 既存の共有スペースに参加（コードの疎通確認）
      await jsonbinRead(shareCode);
      pairCode = shareCode;
      myName = name;
      partnerName = partner;
    }

    await savePairInfo();
    updatePersonTabLabels();
    await loadAllEventLists();
    switchPersonTab('mine');
    document.getElementById('whoamiOverlay').classList.remove('open');

    if (whoamiMode === 'create') {
      // 作成直後は共有コードを表示してパートナーに渡してもらう
      document.getElementById('shareCodeRevealTitle').textContent = '共有スペースができました！';
      document.getElementById('shareCodeRevealDesc').textContent = '下の共有コードをパートナーにLINEなどで送ってください。';
      document.getElementById('shareCodeRevealInput').value = pairCode;
      document.getElementById('revealMyNameInput').value = myName;
      document.getElementById('revealPartnerNameInput').value = partnerName;
      document.getElementById('revealError').textContent = '';
      document.getElementById('shareCodeRevealOverlay').classList.add('open');
    }
  } catch (e) {
    errorEl.textContent = (whoamiMode === 'join' ? '共有コードが正しくないか、読み込みに失敗しました' : '共有スペースの作成に失敗しました') + '（詳細: ' + (e && e.message ? e.message : String(e)) + '）';
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'はじめる';
  }
}

function copyShareCode() {
  const input = document.getElementById('shareCodeRevealInput');
  input.select();
  input.setSelectionRange(0, 99999);
  try { document.execCommand('copy'); } catch (e) {}
  if (navigator.clipboard) {
    navigator.clipboard.writeText(input.value).catch(() => {});
  }
  const btn = document.getElementById('shareCodeCopyBtn');
  const original = btn.textContent;
  btn.textContent = 'コピーしました！';

// ===== 月送り =====
function changeMonth(delta) {
  viewMonth += delta;
  if (viewMonth < 0) { viewMonth = 11; viewYear -= 1; }
  if (viewMonth > 11) { viewMonth = 0; viewYear += 1; }
  renderCalendar();
}

// ===== 年月ダイヤル選択 =====
const DIAL_ITEM_HEIGHT = 32;
let dialYearValues = [];
let dialMonthValues = [];

function buildDialColumnContent(scrollEl, values, formatFn) {
  scrollEl.innerHTML = '';
  const padTop = document.createElement('div');
  padTop.className = 'dial-scroll-pad';
  scrollEl.appendChild(padTop);

  values.forEach(v => {
    const item = document.createElement('div');
    item.className = 'dial-item';
    item.textContent = formatFn ? formatFn(v) : v;
    item.dataset.value = v;
    scrollEl.appendChild(item);
  });

  const padBottom = document.createElement('div');
  padBottom.className = 'dial-scroll-pad';
  scrollEl.appendChild(padBottom);
}

function setDialScrollToValue(scrollEl, values, currentValue) {
  const idx = values.indexOf(currentValue);
  scrollEl.scrollTop = Math.max(0, idx) * DIAL_ITEM_HEIGHT;
  highlightDialCurrent(scrollEl);
}

function highlightDialCurrent(scrollEl) {
  const idx = Math.round(scrollEl.scrollTop / DIAL_ITEM_HEIGHT);
  scrollEl.querySelectorAll('.dial-item').forEach((item, i) => {
    item.classList.toggle('dial-current', i === idx);
  });
}

function getDialValue(scrollEl, values) {
  const idx = Math.round(scrollEl.scrollTop / DIAL_ITEM_HEIGHT);
  const clamped = Math.min(Math.max(idx, 0), values.length - 1);
  return values[clamped];
}

function snapDialScroll(scrollEl) {
  const idx = Math.round(scrollEl.scrollTop / DIAL_ITEM_HEIGHT);
  scrollEl.scrollTop = idx * DIAL_ITEM_HEIGHT;
}

function openYearMonthPicker() {
  dialYearValues = [];
  for (let y = viewYear - 10; y <= viewYear + 10; y++) dialYearValues.push(y);
  dialMonthValues = [];
  for (let m = 1; m <= 12; m++) dialMonthValues.push(m);

  const yearScroll = document.getElementById('dialYearScroll');
  const monthScroll = document.getElementById('dialMonthScroll');

  // 先に要素の中身(項目リスト)だけ組み立てる（スクロール位置はまだ設定しない）
  buildDialColumnContent(yearScroll, dialYearValues);
  buildDialColumnContent(monthScroll, dialMonthValues);

  // オーバーレイを表示してレイアウトを確定させてから、スクロール位置を設定する
  document.getElementById('yearMonthOverlay').classList.add('open');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      setDialScrollToValue(yearScroll, dialYearValues, viewYear);
      setDialScrollToValue(monthScroll, dialMonthValues, viewMonth + 1);
    });
  });
}

function closeYearMonthPicker() {
  document.getElementById('yearMonthOverlay').classList.remove('open');
}

function confirmYearMonthPicker() {
  const yearScroll = document.getElementById('dialYearScroll');
  const monthScroll = document.getElementById('dialMonthScroll');
  viewYear = getDialValue(yearScroll, dialYearValues);
  viewMonth = getDialValue(monthScroll, dialMonthValues) - 1;
  renderCalendar();
  closeYearMonthPicker();
}

// ===== スワイプで月送り =====
(function setupSwipe() {
  const gridWrap = document.getElementById('gridWrap');
  const track = document.getElementById('calendarTrack');
  let startX = 0, startY = 0, currentDx = 0;
  let tracking = false, deciding = true, isHorizontalSwipe = false;
  let paneWidth = 0;
  let animating = false;

  function setTrackX(px, withTransition) {
    track.style.transition = withTransition ? 'transform 0.28s cubic-bezier(0.22, 0.61, 0.36, 1)' : 'none';
    track.style.transform = `translateX(${px}px)`;
  }

  gridWrap.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1 || animating) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    currentDx = 0;
    tracking = true;
    deciding = true;
    isHorizontalSwipe = false;
    paneWidth = gridWrap.getBoundingClientRect().width;
  }, { passive: true });

  gridWrap.addEventListener('touchmove', (e) => {
    if (!tracking) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    const dx = x - startX;
    const dy = y - startY;

    if (deciding) {
      // 最初の移動量で「横スワイプ」か「縦スクロール」かを判定する
      if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
      isHorizontalSwipe = Math.abs(dx) > Math.abs(dy) * 1.3;
      deciding = false;
    }
    if (!isHorizontalSwipe) return;

    e.preventDefault(); // 横スワイプ中は縦スクロールを止める
    currentDx = dx;
    // 中央(今月)の基準位置(-paneWidth)から、指の移動量だけずらして指に追従させる
    setTrackX(-paneWidth + dx, false);
  }, { passive: false });

  gridWrap.addEventListener('touchend', () => {
    if (!tracking) return;
    tracking = false;
    if (!isHorizontalSwipe) return;

    const threshold = paneWidth * 0.22; // パネル幅の22%以上動かしたらページ送りとみなす
    animating = true;

    if (currentDx <= -threshold) {
      // 左へ大きくスワイプ → 次月へ
      setTrackX(-paneWidth * 2, true);
      track.addEventListener('transitionend', function onEnd() {
        track.removeEventListener('transitionend', onEnd);
        changeMonth(1);
        animating = false;
      }, { once: true });
    } else if (currentDx >= threshold) {
      // 右へ大きくスワイプ → 前月へ
      setTrackX(0, true);
      track.addEventListener('transitionend', function onEnd() {
        track.removeEventListener('transitionend', onEnd);
        changeMonth(-1);
        animating = false;
      }, { once: true });
    } else {
      // 戻す
      setTrackX(-paneWidth, true);
      track.addEventListener('transitionend', function onEnd() {
        track.removeEventListener('transitionend', onEnd);
        animating = false;
      }, { once: true });
    }
  });
})();

// ダイヤルのスクロール中にハイライトを更新し、止まったらスナップさせる
(function setupDialScrollListeners() {
  let scrollTimers = {};
  ['dialYearScroll', 'dialMonthScroll'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('scroll', () => {
      highlightDialCurrent(el);
      clearTimeout(scrollTimers[id]);
      scrollTimers[id] = setTimeout(() => {
        snapDialScroll(el);
        highlightDialCurrent(el);
      }, 120);
    }, { passive: true });
  });
})();

  viewMonth = now.getMonth();

  if (!pairCode || !myName || !partnerName) {
    // ペア設定が済んでいない場合は、設定が終わるまでカレンダーは表示しない
    openWhoamiOverlay();
    return;

  await loadAllEventLists();
  renderCalendar();
}
